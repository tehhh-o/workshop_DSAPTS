<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adding Users - UTeM</title>
  <link rel="stylesheet" href="../style/styles.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-box">UTeM</div>
        <div class="logo-sub">UNIVERSITI TEKNIKAL MALAYSIA MELAKA</div>
      </div>
      <nav class="nav">
        <a class="active" href="advisor.html">
          <span class="ico">👨‍💼</span>Advisor
        </a>
        <a class="" href="student.html">
          <span class="ico">🎓</span>Student
        </a>
        <a class="" href="admin.html">
          <span class="ico">⚙️</span>Admin
        </a>
        <a class="" href="#">
          <span class="ico">👤</span>Profile
        </a>
      </nav>
      <button class="logout" onclick="location.href='../index.html'">Log out</button>
    </aside>
    <header class="topbar">
      <div style="width: 120px;"></div>
      <div class="title">Adding Users</div>
      <div class="user">
        <span>Name -</span>
        <span class="avatar">👤</span>
      </div>
    </header>
    <main class="content">
      <form class="form" onsubmit="event.preventDefault(); alert('Added');">
        <div class="field">
          <label>Name</label>
          <input type="text">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email">
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel">
        </div>
        <div class="field">
          <label>Advisor ID</label>
          <input type="text">
        </div>
        <button class="add-submit" type="submit">Add</button>
      </form>
    </main>
  </div>
</body>

</html>
