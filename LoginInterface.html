!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Interface</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border: 2px solid #7f7f7f;
            position: relative;
        }

        .top-label {
            color: #ffffff;
            background-color: #000000;
            font-size: 14px;
            padding: 5px 10px;
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .header {
            display: flex;
            align-items: center;
            background-color: #d9d9d9;
            border-bottom: 2px solid #7f7f7f;
            padding: 10px;
        }

        .logo-section {
            width: 90px;
            height: 60px;
            border-right: 2px solid #7f7f7f;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-right: 10px;
            margin-right: 15px;
        }

        /* Placeholder styles for the logo image */
        .logo-placeholder {
            font-size: 20px;
            font-weight: bold;
            color: #003366;
        }

        .title-section {
            flex-grow: 1;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            color: #000000;
            line-height: 1.2;
            padding-right: 20px;
        }

        .form-container {
            padding: 30px 40px 15px 40px;
            background-color: #ffffff;
            min-height: 280px;
            display: flex;
            flex-direction: column;
        }

        .input-group {
            margin-bottom: 15px;
            width: 65%;
        }

        .input-group label {
            display: block;
            font-size: 18px;
            margin-bottom: 5px;
            color: #000000;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 6px;
            font-size: 16px;
            border: 1px solid #7f7f7f;
            background-color: #d9d9d9;
            outline: none;
        }

        .password-toggle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 35px;
            background-color: #d9d9d9;
            border: 1px solid #7f7f7f;
            border-left: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: #000000;
        }

        .login-btn-container {
            margin-top: 25px;
        }

        .login-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #d9d9d9;
            border: 1px solid #7f7f7f;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .login-btn svg {
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            margin-top: auto;
            text-align: right;
        }

        .forgot-password a {
            color: #5b9bd5;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div style="position: relative;"></div>
        
        <div class="container">
            <!-- logo and title -->
            <div class="header">
                <div class="logo-section">
                    <!-- Replace text with <img src="logo_path.png" alt="UTeM Logo"> when ready -->
                    <div class="logo-placeholder">UTeM</div>
                </div>
                <div class="title-section">
                    Diploma Student Academic And Progress<br>Tracking Sytem
                </div>
            </div>

            <!-- Main Login Form -->
            <form class="form-container" onsubmit="event.preventDefault();">
                <!-- User ID Field -->
                <div class="input-group">
                    <label for="username">User ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" style="padding-right: 40px;" required>
                        <div class="password-toggle" onclick="togglePassword()">
                            <!-- Eye slash icon representing hidden password -->
                            <svg viewBox="0 0 24 24">
                                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Login Button -->
                <div class="login-btn-container">
                    <button type="submit" class="login-btn">
                        <!-- Sign-in Arrow Icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13 12H3"/>
                        </svg>
                        Login
                    </button>
                </div>

                <!-- Forgot Password Link -->
                <div class="forgot-password">
                    <a href="#">Forgot Password</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        //toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
    </script>

</body>
</html>
